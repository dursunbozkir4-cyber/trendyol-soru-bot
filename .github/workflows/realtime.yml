name: Anlik Soru Bildirimi

# GitHub'in */5 cron'u guvenilmez. Bunun yerine: tek is 65 dk boyunca kendi
# icinde 5 dk'da bir kontrol eder; saatlik (guvenilir) yeniden baslar.
on:
  schedule:
    - cron: '3 * * * *'    # her saat (saatlik cron guvenilir calisir)
  workflow_dispatch:

concurrency:
  group: realtime
  cancel-in-progress: true   # yeni baslayan, eskisini iptal edip devam alir

permissions:
  contents: write

jobs:
  bildir:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 65 dk boyunca her 5 dk yeni sorulari bildir
        env:
          TRENDYOL_SELLER_ID: ${{ secrets.TRENDYOL_SELLER_ID }}
          TRENDYOL_API_KEY: ${{ secrets.TRENDYOL_API_KEY }}
          TRENDYOL_API_SECRET: ${{ secrets.TRENDYOL_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.name "trendyol-bot"
          git config user.email "bot@users.noreply.github.com"
          end=$((SECONDS + 3900))   # ~65 dakika
          while [ $SECONDS -lt $end ]; do
            node notify-new.mjs || echo "notify hata (devam)"
            if [ -n "$(git status --porcelain notified.json)" ]; then
              git pull --rebase -q origin main || true
              git add notified.json
              git commit -q -m "durum: bildirim listesi [skip ci]" || true
              git push -q || true
            fi
            sleep 300
          done
